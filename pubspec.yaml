name: phoenix_slack
description: DevConnect — A developer community app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Networking
  dio: ^5.4.3
  retrofit: ^4.1.0
  socket_io_client: ^3.1.4

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3

  # JSON
  json_annotation: ^4.9.0

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0

  # File handling
  image_picker: ^1.0.4
  file_picker: ^8.0.7
  open_file: ^3.3.2
  path_provider: ^2.1.4

  permission_handler: ^12.0.1
  firebase_messaging: ^16.1.2

  # Utilities
  intl: ^0.19.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  json_serializable: ^6.8.0
  retrofit_generator: ^8.1.0

flutter:
  uses-material-design: true
